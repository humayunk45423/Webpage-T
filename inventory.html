<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Express | Active Inventory</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 3D Interactive Business Card Artifacts -->
    <div class="parallax-environment">
        <div class="card-band band-left-1" data-speed="0.3"></div>
        <div class="card-band band-left-2" data-speed="0.6"></div>
        <div class="card-band band-right-1" data-speed="-0.3"></div>
        <div class="card-band band-right-2" data-speed="-0.6"></div>
        <div class="ambient-glow"></div>
    </div>

    <!-- Floating Glass Navbar -->
    <header class="glass-header">
        <nav class="nav-container">
            <a href="index.html" class="brand">
                <img src="assets/logo.png" alt="ME" onerror="this.src='https://i.postimg.cc/PJhCYJzg/Artboard_1logo_border_radious.png'">
                <div class="brand-text">
                    <strong>Mobile Express</strong>
                    <span>Iqbal Tanvir</span>
                </div>
            </a>
            <div class="nav-links">
                <a href="index.html#hero">Home</a>
                <a href="index.html#services">Diagnostics</a>
                <a href="inventory.html" class="active">Inventory <span class="badge">25+</span></a>
                <a href="index.html#contact">Contact</a>
            </div>
            <a href="https://wa.me/8801834254875" class="btn-support">
                <i class="fa-brands fa-whatsapp"></i> Support
            </a>
        </nav>
    </header>

    <main class="app-content">
        <section class="glass-panel" style="padding: 60px;">
            <div class="hero-inner" data-tilt data-tilt-max="2" data-tilt-glare="true" data-tilt-max-glare="0.1">
                <h1 class="section-title" style="margin-bottom: 20px;">Mid & Budget Range</h1>
                <p style="text-align: center; color: var(--text-secondary); margin-bottom: 50px;">
                    Handpicked, highly popular devices for the Bangladeshi market. All units pass rigorous software and hardware testing.
                </p>
                
                <div class="inv-grid" id="inventory-grid">
                    <!-- Products injected via JS -->
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Mobile Express. System architecture by Iqbal Tanvir.</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
